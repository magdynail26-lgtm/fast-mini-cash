<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAST MINI CASH - V33 FULL SCREEN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Readex+Pro:wght@400;700&display=swap');
        :root { --bg: #050010; --purple: #bc13fe; --cyan: #00f2ff; --fire: #ff4d00; --gold: #ffd700; }
        
        /* منع السكرول في الشاشة الرئيسية لضمان الفرش الكامل */
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Readex Pro', sans-serif; height: 100vh; width: 100%; overflow: hidden; position: fixed; }
        
        /* شاشة الدخول */
        #onboarding { position: fixed; inset: 0; background: var(--bg); z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .reg-card { background: rgba(157, 0, 255, 0.1); padding: 30px; border-radius: 35px; border: 3px solid var(--purple); width: 90%; max-width: 400px; box-shadow: 0 0 50px rgba(188, 19, 254, 0.4); }
        .av-item { font-size: 70px; cursor: pointer; border: 4px solid transparent; border-radius: 50%; transition: 0.3s; padding: 10px; display: inline-block; }
        .av-item.selected { border-color: var(--cyan); box-shadow: 0 0 30px var(--cyan); transform: scale(1.1); }

        /* الهيكل الذكي لفرش الشاشة */
        .app-shell { width: 100%; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; background: radial-gradient(circle at center, #1a0033, #050010); }
        
        /* الجزء العلوي */
        .top-nav { height: 70px; display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:0 15px; border-radius:20px; border:1px solid var(--purple); }
        
        /* ميزان العملة - يأخذ المساحة الأكبر في السنتر */
        .bal-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .bal-val { font-family: 'Orbitron'; font-size: 80px; font-weight: 900; text-shadow: 0 0 40px var(--purple), 0 0 15px var(--cyan); margin: 0; line-height: 1; }
        .bal-label { color: var(--cyan); font-size: 14px; font-weight: bold; letter-spacing: 4px; margin-top: 10px; }

        /* منطقة الأزرار - موزعة بانتظام */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; padding-bottom: 10px; }
        .menu-item { border-radius: 20px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-weight: bold; }
        .menu-item i { font-size: 30px; margin-bottom: 5px; }

        .item-tasks { background: rgba(255, 77, 0, 0.1); border-color: var(--fire); color: var(--fire); }
        .item-friends { background: rgba(188, 19, 254, 0.1); border-color: var(--purple); color: var(--purple); }
        .item-wallet { background: rgba(0, 242, 255, 0.1); border-color: var(--cyan); color: var(--cyan); }
        
        /* الهدية منورة دايماً */
        #dailyBtn { background: rgba(0, 242, 255, 0.1) !important; border: 2px solid var(--cyan) !important; box-shadow: 0 0 20px var(--cyan); color: #fff !important; animation: pulseNeon 2s infinite; }
        @keyframes pulseNeon { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        /* القوائم - تدعم السكرول الداخلي فقط */
        .overlay { position: fixed; inset: 0; background: rgba(5,0,16,0.99); z-index: 2000; display: none; flex-direction: column; padding: 25px; overflow-y: auto; }
        .overlay.active { display: flex; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 25px; border: 1px solid var(--purple); margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        
        .huge-title { font-family: 'Orbitron'; font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--purple); margin-top: 50px; }

        .nav-bar { height: 75px; background: rgba(20,0,40,0.95); border-radius: 20px; border: 1px solid var(--cyan); display: flex; justify-content: space-around; align-items: center; width: 100%; margin-top: 5px; }
        .claim-btn { background: var(--purple); color: #fff; border: none; height: 55px; width: 100%; border-radius: 15px; font-weight: 900; cursor: pointer; }
        .main-input { width: 100%; padding: 15px; background: #000; border: 2px solid var(--purple); border-radius: 12px; color: var(--cyan); text-align: center; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="onboarding">
    <div class="reg-card">
        <h2 style="font-family:'Orbitron'; color:var(--cyan)">FAST MINI CASH</h2>
        <div style="margin: 15px 0;">
            <div id="b" class="av-item" onclick="selAv('👦', 'b')">👦</div>
            <div id="g" class="av-item" onclick="selAv('👧', 'g')">👧</div>
        </div>
        <input type="text" id="nameIn" class="main-input" placeholder="اسمك المستعار">
        <button class="claim-btn" style="background:var(--cyan); color:#000;" onclick="startApp()">دخول المنصة</button>
    </div>
</div>

<div class="app-shell">
    <div class="top-nav" onclick="openO('profileO')">
        <div style="display:flex; align-items:center; gap:10px;">
            <span id="pTop" style="font-size:30px;">👤</span>
            <div style="text-align: right;"><b id="nTop">المستخدم</b><span style="color:var(--cyan); font-size:9px; display:block;">FMC PRO</span></div>
        </div>
        <i class="fas fa-crown" style="color:var(--gold)"></i>
    </div>

    <div class="bal-container">
        <h1 class="bal-val" id="mBal">0</h1>
        <span class="bal-label">TOTAL FMC BALANCE</span>
    </div>

    <div class="grid-menu">
        <div class="menu-item item-tasks" onclick="openO('tasksO')"><i class="fas fa-bolt"></i><span>المهام</span></div>
        <div class="menu-item item-friends" onclick="openO('friendsO')"><i class="fas fa-user-plus"></i><span>الأصدقاء</span></div>
        <div class="menu-item item-wallet" onclick="openO('walletO')"><i class="fas fa-wallet"></i><span>السحب</span></div>
        <button id="dailyBtn" class="menu-item" style="font-family:inherit; width:100%" onclick="claimDaily()">
            <i class="fas fa-gift"></i><span id="dTxt">استلم 50 FMC</span>
        </button>
    </div>

    <div class="nav-bar">
        <div class="nav-btn" onclick="closeO()" style="color:var(--cyan)"><i class="fas fa-home fa-xl"></i></div>
        <div class="nav-btn" onclick="openO('tasksO')"><i class="fas fa-tasks fa-xl"></i></div>
        <div class="nav-btn" onclick="openO('specialO')"><i class="fas fa-gem fa-xl"></i></div>
    </div>
</div>

<div id="tasksO" class="overlay">
    <div onclick="closeO()" style="color:var(--cyan); cursor:pointer; font-weight:bold; margin-bottom:15px;">✕ رجوع</div>
    <div style="background:rgba(255, 77, 0, 0.1); border:1px solid var(--fire); padding:10px; border-radius:15px; color:var(--fire); margin-bottom:15px;">⚡ تجديد المهام تلقائياً كل ساعتين</div>
    <div id="taskList"></div>
</div>

<div id="friendsO" class="overlay">
    <div onclick="closeO()" style="color:var(--cyan); cursor:pointer; font-weight:bold; margin-bottom:20px;">✕ رجوع</div>
    <div class="card">
        <input type="text" id="rL" class="main-input" readonly>
        <button class="claim-btn" style="background:var(--cyan); color:#000;" onclick="copyRef()">نسخ الرابط</button>
    </div>
    <div id="rUI"></div>
</div>

<div id="specialO" class="overlay">
    <div onclick="closeO()" style="color:var(--cyan); cursor:pointer; font-weight:bold;">✕ رجوع</div>
    <div class="bal-container" style="height:70vh;">
        <h1 class="huge-title">COMING<br>SOON</h1>
        <p style="color:var(--cyan); font-size:20px; margin-top:20px;">انتظروا أقوى العروض قريباً</p>
    </div>
</div>

<div id="walletO" class="overlay">
    <div onclick="closeO()" style="color:var(--cyan); cursor:pointer; font-weight:bold; margin-bottom:20px;">✕ رجوع</div>
    <div class="card">
        <h2 id="uVal" style="font-family:'Orbitron'; font-size:45px; color:var(--cyan)">0.00$</h2>
        <p>10,000 FMC = 5$</p>
        <select class="main-input" id="wM" style="color:#fff;">
            <option>Vodafone Cash</option>
            <option>Tonkeeper (TON)</option>
            <option>OKX (USDT)</option>
            <option>Binance (USDT)</option>
        </select>
        <input type="text" id="wA" class="main-input" style="color:#fff;" placeholder="الرقم أو العنوان">
        <button class="claim-btn" onclick="withdraw()">طلب سحب</button>
    </div>
</div>

<div id="profileO" class="overlay">
    <div onclick="closeO()" style="color:var(--cyan); cursor:pointer; font-weight:bold; margin-bottom:20px;">✕ رجوع</div>
    <div class="card">
        <span id="pLarge" style="font-size:70px;">👤</span>
        <h2 id="pName">المستخدم</h2>
        <input type="text" id="newName" class="main-input" style="color:#fff;" placeholder="اسم جديد">
        <button class="claim-btn" onclick="updateN()">تغيير الاسم (50 FMC)</button>
    </div>
</div>

<script>
    let bal = parseFloat(localStorage.getItem('fmc_v33_bal')) || 0;
    let chAv = '';
    const LINKS = [
        "https://www.profitablecpmratenetwork.com/ri7h7fy2m?key=a958d54ef573ab4c940d32e921e9aad1",
        "https://www.profitablecpmratenetwork.com/dkj4u9gvv?key=16dbbc90d6aaa78d8da4f39d8e371a30",
        "https://www.profitablecpmratenetwork.com/gc7zweyr38?key=b3eebef124b57f5107fe2884d1216c38",
        "https://www.profitablecpmratenetwork.com/bz6vv75f3y?key=806ff2b9e979839383adfc5b99d0b0cf",
        "https://www.profitablecpmratenetwork.com/wpy09fs5r?key=4d281ba09c98af95d14344e8ece24f5e"
    ];
    const ALL_LINKS = Array(10).fill(LINKS).flat();

    window.onload = () => {
        if(!localStorage.getItem('reg_v33')) document.getElementById('onboarding').style.display='flex';
        else initApp();
        renderT(); renderR(); updateUI(); setInterval(tick, 1000);
    };

    function selAv(a, i) { chAv=a; document.querySelectorAll('.av-item').forEach(e=>e.classList.remove('selected')); document.getElementById(i).classList.add('selected'); }
    function startApp() {
        let n = document.getElementById('nameIn').value.trim(); if(!n || !chAv) return alert("أكمل البيانات!");
        bal = 50; localStorage.setItem('fmc_v33_bal', bal); localStorage.setItem('v33_n', n);
        localStorage.setItem('v33_a', chAv); localStorage.setItem('reg_v33', 'true');
        location.reload();
    }
    function initApp() {
        document.getElementById('onboarding').style.display='none';
        document.getElementById('nTop').innerText = localStorage.getItem('v33_n');
        document.getElementById('pTop').innerText = localStorage.getItem('v33_a');
        document.getElementById('pName').innerText = localStorage.getItem('v33_n');
        document.getElementById('pLarge').innerText = localStorage.getItem('v33_a');
        document.getElementById('rL').value = "https://fast-mini-cash.vercel.app?ref=" + encodeURIComponent(localStorage.getItem('v33_n'));
    }

    function renderT() {
        let h = ''; ALL_LINKS.forEach((l, i) => {
            h += `<div class="card"><b>💰 مهمة #${i+1} <span style="color:var(--cyan)">(+25 FMC)</span></b><button id="tk${i}" class="claim-btn" style="height:45px; margin-top:10px; background:var(--cyan); color:#000;" onclick="goT(${i},'${l}')">إتمام المهمة ⚡</button></div>`;
        });
        document.getElementById('taskList').innerHTML = h;
    }

    function goT(i, u) {
        window.open(u, '_blank'); let b = document.getElementById('tk'+i);
        let s = 60; b.disabled = true;
        let c = setInterval(() => {
            b.innerText = "انتظر " + s + " ث"; s--;
            if(s < 0) {
                clearInterval(c); b.innerText = "استلام العملات ✅"; b.disabled = false;
                b.onclick = () => { bal += 25; localStorage.setItem('fmc_v33_bal', bal); localStorage.setItem('v33_t'+i, new Date().getTime()); updateUI(); alert("تم الاستلام!"); location.reload(); };
            }
        }, 1000);
    }

    function tick() {
        let now = new Date().getTime();
        let ld = localStorage.getItem('v33_ld');
        let dbText = document.getElementById('dTxt');
        if(ld && (now - ld < 86400000)) {
            let diff = 86400000 - (now - ld);
            let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            dbText.innerText = `${h}:${m}:${s}`;
        } else { dbText.innerText = "استلم 50 FMC"; }
        ALL_LINKS.forEach((_, i) => {
            let t = localStorage.getItem('v33_t'+i); let b = document.getElementById('tk'+i);
            if(t && (now - t < 7200000)) { if(b) { b.disabled = true; b.innerText = "تتجدد قريباً"; b.style.background = "#333"; } }
        });
    }

    function claimDaily() {
        let now = new Date().getTime(); let ld = localStorage.getItem('v33_ld');
        if(ld && (now - ld < 86400000)) return;
        bal += 50; localStorage.setItem('fmc_v33_bal', bal); localStorage.setItem('v33_ld', now);
        updateUI(); alert("🎁 مبروك!");
    }

    function updateUI() { document.getElementById('mBal').innerText = bal.toFixed(0); document.getElementById('uVal').innerText = ((bal/10000)*5).toFixed(2) + "$"; }

    function updateN() {
        let n = document.getElementById('newName').value.trim(); if(!n) return;
        if(bal < 50) return alert("ليس لديك رصيد كافي!");
        bal -= 50; localStorage.setItem('fmc_v33_bal', bal); localStorage.setItem('v33_n', n);
        location.reload();
    }

    function renderR() {
        const r = [{c:3, a:200}, {c:5, a:300}, {c:10, a:500}, {c:15, a:800}, {c:25, a:1500}, {c:50, a:4000}];
        let h = ''; r.forEach(x => { 
            h += `<div style="background:rgba(188,19,254,0.1); border:1px solid var(--purple); border-radius:15px; padding:12px; margin-bottom:10px; display:flex; justify-content:space-between; box-shadow: 0 0 10px var(--purple);"><b>دعوة ${x.c} أصدقاء</b> <span>+${x.a} FMC</span></div>`; 
        });
        document.getElementById('rUI').innerHTML = h;
    }

    function withdraw() {
        if(bal < 10000) alert("ليس لديك رصيد كافي للسحب");
        else alert("تم استلام طلب السحب بنجاح!");
    }

    function openO(id) { document.getElementById(id).classList.add('active'); }
    function closeO() { document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active')); }
    function copyRef() { let c = document.getElementById("rL"); c.select(); document.execCommand("copy"); alert("تم النسخ!"); }
</script>
</body>
</html>
