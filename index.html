<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <style>
        :root { --p: #7c3aed; --c: #00f2ff; --g: #39ff14; --gold: #ffd700; --red: #ff0055; --bg: #02000f; --ton: #0088cc; --card-bg: rgba(10, 6, 36, 0.6); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; touch-action: manipulation; }
        
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; user-select: none; -webkit-user-select: none; }
        
        header {

        }
        .header-stats { display: flex; gap: 12px; align-items: center; }
        .stat-v { text-align: center; }
        .stat-v span { display: block; font-size: 10px; color: var(--c); font-weight: 900; }

        .header-actions { display: flex; gap: 8px; align-items: center; position: relative; z-index: 999999 !important; }
        .btn-lang-globe { background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.4); width: 38px; height: 38px; border-radius: 10px; color: var(--c); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }
        
        .lang-dropdown { display: none; flex-direction: column; position: absolute; top: 55px; left: 0; background: rgba(5, 2, 25, 0.98); border: 1px solid var(--c); border-radius: 14px; padding: 6px; gap: 4px; z-index: 10000000 !important; box-shadow: 0 4px 25px rgba(0,242,255,0.3); max-height: 260px; overflow-y: auto; width: 140px; }
        .dropdown-item { padding: 8px 10px; font-size: 11px; font-weight: 900; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 6px; border-radius: 8px; }

        .btn-connect { background: linear-gradient(135deg, #0088cc, #0077b5); border: 1px solid rgba(0,242,255,0.3); padding: 8px 12px; border-radius: 10px; color: white; font-size: 11px; font-weight: 900; cursor: pointer; }
        .btn-connect.connected { background: linear-gradient(135deg, var(--g), #16a34a); border-color: rgba(57,255,20,0.4); color: #000 !important; }

        .main-container { flex: 1; position: relative; width: 100%; overflow: hidden; display: flex; }
        .page-room { position: absolute; inset: 0; width: 100%; height: 100%; display: none; flex-direction: column; padding: 15px; background: var(--bg); z-index: 20; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 30px; }
        .page-room.active { display: flex; }
